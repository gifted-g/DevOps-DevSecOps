apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentbit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    [INPUT]
        Name              tail
        Tag               logstorm.*
        Path              /var/log/containers/logstorm*.log
        Parser            cri
        DB                /tmp/flb_logstorm.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  5

    [FILTER]
        Name          kubernetes
        Match         logstorm.*
        Kube_URL      https://kubernetes.default.svc:443
        Kube_CA_File  /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log     On
        Keep_Log      Off
        K8S-Logging.Parser On

    [OUTPUT]
        Name            http
        Match           logstorm.*
        Host            openobserve.openobserve.svc.cluster.local
        Port            5080
        URI             /api/default/default/_json
        Format          json
        Json_date_key   _timestamp
        Json_date_format iso8601
        HTTP_User       root@benchmark.local
        HTTP_Passwd     BenchmarkPass123!
        tls             Off
        compress        gzip
        Retry_Limit     3

    [OUTPUT]
        Name            opensearch
        Match           logstorm.*
        Host            opensearch.opensearch.svc.cluster.local
        Port            9200
        Index           logstorm
        Suppress_Type_Name On
        tls             Off
        Retry_Limit     3
        Trace_Error     On

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    [PARSER]
        Name        json
        Format      json
        Time_Key    timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    [PARSER]
        Name        nginx
        Format      regex
        Regex       ^(?<remote>[^ ]*) - (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<code>[^ ]*) (?<size>[^ ]*)(?: "(?<referer>[^\"]*)" "(?<agent>[^\"]*)")
        Time_Key    time
        Time_Format %d/%b/%Y:%H:%M:%S %z
